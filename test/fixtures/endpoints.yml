  version: project1v2
  note: "Get the current user"
p1v2_users_update:
  http_verb: 3
  path: /users/me
  version: project1v2
  note: "Update the current user's fields"
p1v2_users_delete:
  http_verb: 4
  path: /users/me
  version: project1v2
  note: "Delete the current user"
p1v2_sessions_create:
  http_verb: 1
  path: /sessions
  version: project1v2
  note: "Log in with email and password"
p1v2_sessions_delete:
  http_verb: 4
  path: /sessions
  version: project1v2
  note: "Log out the current session"

