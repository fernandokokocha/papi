# http_verb: 0=GET, 1=POST, 2=PUT, 3=PATCH, 4=DELETE

# ===== v1: initial User API =====
p1v1_users_list:
  http_verb: 0
  path: /users
  version: project1v1
  output: "[User]"
  output_error: "Error"
  note: "List all users"
p1v1_users_create:
  http_verb: 1
  path: /users
  version: project1v1
  output: "User"
  output_error: "Error"
  note: "Create a new user"
p1v1_users_get:
  http_verb: 0
  path: /users/:id
  version: project1v1
  output: "User"
  output_error: "Error"
  note: "Get a single user by id"
p1v1_users_delete:
  http_verb: 4
  path: /users/:id
  version: project1v1
  output: "boolean"
  output_error: "Error"
  note: "Delete a user"
p1v1_sessions_create:
  http_verb: 1
  path: /sessions
  version: project1v1
  output: "Session"
  output_error: "Error"
  note: "Log in with email and password"

